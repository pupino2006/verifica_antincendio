<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <!-- Librerie Esterne -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #004a99; --secondary: #8b98a7; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Header e Navigazione */
        .header-logo { display: flex; justify-content: center; align-items: center; padding: 15px; background: var(--white); border-bottom: 1px solid #ddd; }
        .header-logo img { height: 50px; }

        .btn-home-fixed { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--primary); color: white; border: 2px solid white; padding: 8px 15px; border-radius: 25px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: rgba(255,255,255,0.7); font-weight: bold; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: white; border-bottom-color: white; background: #003366; }

        /* Form e Card */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { background: var(--white); padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 10px; line-height: 1.4; }
        .opzioni { display: flex; gap: 20px; margin-bottom: 10px; }
        .sezione-titolo { background: var(--primary); color: white; padding: 10px; border-radius: 8px; margin: 25px 0 15px; text-align: center; font-weight: bold; }

        /* Contenitore Firma */
        .signature-container { border: 2px dashed #ccc; background: #fff; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        .signature-pad-canvas { width: 100%; height: 150px; display: block; cursor: crosshair; }

        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-clear { margin-top:5px; background:none; border:1px solid red; color:red; padding:8px 15px; border-radius:4px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .btn-foto { background: #e9ecef; border: 1px solid #ced4da; border-radius: 8px; padding: 10px 15px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .area-note { width: 100%; height: 60px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 8px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

    <button id="btnHomeFisso" class="btn-home-fixed" onclick="window.tornaAllaHome()">🏠 HOME</button>

    <div class="header-logo">
        <img id="mainLogo" src="pt.png" alt="Logo PT" crossorigin="anonymous">
    </div>

    <!-- Schermata Home -->
    <div id="home-screen" class="container" style="text-align: center;">
        <h2 style="color: var(--primary); margin-top: 40px;">Controllo Periodico Antincendio</h2>
        <p>Seleziona un'operazione per iniziare</p>
        
        <button onclick="window.mostraApp()" class="btn-main" style="margin-top: 20px;">🆕 NUOVA VERIFICA</button>
        <button onclick="window.caricaStorico()" class="btn-main" style="background: var(--secondary); margin-top: 15px;">📂 ARCHIVIO</button>
    </div>

    <!-- App Interface -->
    <div id="app-interface" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn active" id="btn-tab-info" onclick="window.openTab(event, 'tab-info')">📋 INFO</button>
            <button class="tab-btn" id="btn-tab-check" onclick="window.openTab(event, 'tab-check')">✅ CHECKLIST</button>
            <button class="tab-btn" id="btn-tab-invio" onclick="window.openTab(event, 'tab-invio')">✍️ FIRMA</button>
        </nav>

        <div id="tab-info" class="tab-content container">
            <div class="input-group">
                <label>OPERATORE 1</label>
                <select id="operatore_1">
                    <option value="">Seleziona...</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                </select>
            </div>
            <div class="input-group">
                <label>OPERATORE 2 (Ospite/Collaboratore)</label>
                <select id="operatore_2">
                    <option value="">Nessuno</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                </select>
            </div>
            <div class="input-group">
                <label>DATA INTERVENTO</label>
                <input type="date" id="dataVerifica">
            </div>
        </div>

        <div id="tab-check" class="tab-content container" style="display:none;">
            <div id="checklist-container"></div>
        </div>

        <div id="tab-invio" class="tab-content container" style="display:none;">
            <h3 style="color: var(--primary);">Firma Operatore 1</h3>
            <div class="signature-container">
                <canvas id="signature-pad-1" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="window.cancellaFirma(1)">CANCELLA FIRMA 1</button>

            <h3 style="color: var(--primary); margin-top: 20px;">Firma Operatore 2</h3>
            <div class="signature-container">
                <canvas id="signature-pad-2" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="window.cancellaFirma(2)">CANCELLA FIRMA 2</button>
            
            <button id="btnInvia" class="btn-main" style="background: #28a745; margin-top: 40px;" onclick="window.inviaVerifica()">🚀 INVIA E SALVA PDF</button>
        </div>
    </div>

    <!-- Archivio -->
    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Ultime Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="window.tornaAllaHome()" class="btn-clear" style="border-color: #ccc; color: #666; margin-top: 20px;">CHIUDI ARCHIVIO</button>
    </div>

    <script>
        const SB_URL = "https://vnzrewcbnoqbqvzckome.supabase.co";
        const SB_KEY = "sb_publishable_Sq9txbu-PmKdbxETSx2cjw_WqWEFBPO"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let sigPad1 = null;
        let sigPad2 = null;
        let fotoChecklist = {};

        const sezioni = {
            "estintori": [
                "Gli estintori sono segnalati da apposita cartellonistica?",
                "Gli estintori sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sugli estintori (es. manometro al di fuori della zona verde, ammaccature e/o crepe, spina di sicurezza mancante, ecc.)?",
                "L’ultimo controllo sugli estintori da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "idranti": [
                "Gli idranti sono segnalati da apposita cartellonistica?",
                "Gli idranti sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sugli idranti (es. mancanza di lancia erogatrice, manichetta non correttamente avvolta, cassetta ammaccata, ecc.)?",
                "L’ultimo controllo sugli idranti da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "luci_di_emergenza": [
                "Le luci di emergenza sono correttamente funzionanti in caso di mancanza di alimentazione elettrica?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle luci di emergenza (es. mancanza cartellonistica, malfunzionamento batterie, ecc.)?"
            ],
            "impianto_irai": [
                "I dispositivi di rilevazione automatica e i pulsanti manuali di allarme incendio sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sui dispositivi dell’IRAI (es. rilevatori non adeguatamente puliti, mancata attivazione, ecc.)?"
            ],
            "porte_tagliafuoco": [
                "Le porte tagliafuoco sono correttamente segnalate da specifica cartellonistica, e priva di ostacoli alla loro apertura e/o chiusura?",
                "Le prove di aperture e/o chiusura delle porte tagliafuoco ha confermato il loro corretto funzionamento?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle porte tagliafuoco (es. porta chiusa a chiave, maniglione rotto, ecc.)?",
                "L’ultimo controllo sulle porte tagliafuoco da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "vie_di_esodo": [
                "Le vie di esodo e le uscite di sicurezza sono segnalate mediante apposita cartellonistica?",
                "I percorsi di esodo sono privi di materiale che potrebbe fungere da ostacolo all’esodo stesso?",
                "Le vie di esodo sono adeguatamente illuminate?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle vie di esodo e le uscite di sicurezza (es. presenza di combustibili e/o infiammabili, porte non apribili, ecc.)?"
            ]
        };

        window.mostraApp = function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            fotoChecklist = {};
            window.renderChecklist();
            window.openTab(null, 'tab-info');
        };

        window.tornaAllaHome = function() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('app-interface').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'none';
            document.getElementById('btnHomeFisso').style.display = 'none';
        };

        window.openTab = function(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            if (evt) evt.currentTarget.classList.add("active");
            else document.getElementById('btn-' + tabName).classList.add("active");
            if (tabName === 'tab-invio') setTimeout(window.initSignatures, 200);
        };

        window.renderChecklist = function() {
            const container = document.getElementById('checklist-container');
            let html = '';
            for (const [key, domande] of Object.entries(sezioni)) {
                html += `<div class="sezione-titolo">${key.toUpperCase().replace(/_/g, ' ')}</div>`;
                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    html += `
                        <div class="card-verifica">
                            <span class="domanda-testo">${domanda}</span>
                            <div class="opzioni">
                                <label><input type="radio" name="${id}" value="SI"> SI</label>
                                <label><input type="radio" name="${id}" value="NO"> NO</label>
                            </div>
                            <button class="btn-foto" onclick="window.scattaFoto('${id}')">📷 Scatta Foto</button>
                            <div id="preview_${id}" style="display:none; margin-top:10px; text-align:center;">
                                <img id="img_${id}" src="" style="width:100%; max-width:200px; border-radius:8px; border:1px solid #ddd;">
                            </div>
                            <textarea id="note_${id}" class="area-note" placeholder="Note..."></textarea>
                            <input type="file" id="input_${id}" style="display:none" accept="image/*" capture="environment" onchange="window.caricaFoto(event, '${id}')">
                        </div>`;
                });
            }
            container.innerHTML = html;
        };

        window.scattaFoto = function(id) { document.getElementById(`input_${id}`).click(); };

        window.caricaFoto = function(event, id) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoChecklist[id] = e.target.result;
                    document.getElementById(`img_${id}`).src = e.target.result;
                    document.getElementById(`preview_${id}`).style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        window.initSignatures = function() {
            const c1 = document.getElementById('signature-pad-1');
            const c2 = document.getElementById('signature-pad-2');
            if (c1) {
                sigPad1 = new SignaturePad(c1, { backgroundColor: 'rgba(255,255,255,0)', penColor: 'black' });
                window.resizeCanvas(c1, sigPad1);
            }
            if (c2) {
                sigPad2 = new SignaturePad(c2, { backgroundColor: 'rgba(255,255,255,0)', penColor: 'black' });
                window.resizeCanvas(c2, sigPad2);
            }
        };

        window.resizeCanvas = function(canvas, pad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            pad.clear();
        };

        window.cancellaFirma = function(n) {
            if (n === 1) sigPad1.clear();
            else sigPad2.clear();
        };

        // Funzione per convertire il logo in base64 per jsPDF
        async function getBase64ImageFromURL(url) {
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                return null;
            }
        }

        window.inviaVerifica = async function() {
            const op1 = document.getElementById('operatore_1').value;
            const op2 = document.getElementById('operatore_2').value;
            if (!op1) return alert("Seleziona Operatore 1!");

            const btn = document.getElementById('btnInvia');
            btn.disabled = true;
            btn.innerText = "Salvataggio...";

            try {
                const payload = { operatore_1: op1, operatore_2: op2 || null };
                await supabaseClient.from('verifiche_antincendio').insert([payload]);

                const pdf = await window.generaPDF();
                const url = URL.createObjectURL(pdf);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Verifica_${op1.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`;
                a.click();

                alert("✅ Report Generato!");
                window.tornaAllaHome();
            } catch (e) {
                alert("Errore: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 INVIA E SALVA PDF";
            }
        };

        window.generaPDF = async function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 15;

            // Inserimento Logo (Tentativo di caricamento immagine pt.png)
            const logoBase64 = await getBase64ImageFromURL('pt.png');
            if (logoBase64) {
                doc.addImage(logoBase64, 'PNG', 160, 10, 35, 12);
            }

            doc.setFontSize(20);
            doc.setTextColor(0, 74, 153);
            doc.text("REPORT VERIFICA ANTINCENDIO", 10, y + 10);
            y += 25;

            doc.setFontSize(11);
            doc.setTextColor(0);
            doc.text(`Operatore 1: ${document.getElementById('operatore_1').value}`, 10, y);
            y += 7;
            doc.text(`Operatore 2: ${document.getElementById('operatore_2').value || 'Nessuno'}`, 10, y);
            y += 7;
            doc.text(`Data: ${document.getElementById('dataVerifica').value}`, 10, y);
            y += 15;

            for (const [key, domande] of Object.entries(sezioni)) {
                if (y > 260) { doc.addPage(); y = 20; }
                doc.setFont(undefined, 'bold');
                doc.setFillColor(230, 230, 230);
                doc.rect(10, y - 5, 190, 8, 'F');
                doc.text(key.toUpperCase().replace(/_/g, ' '), 12, y);
                y += 12;
                doc.setFont(undefined, 'normal');

                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    const risposta = document.querySelector(`input[name="${id}"]:checked`)?.value || "N.D.";
                    const nota = document.getElementById(`note_${id}`).value;

                    if (y > 260) { doc.addPage(); y = 20; }
                    
                    const splitText = doc.splitTextToSize(`${domanda}`, 160);
                    doc.text(splitText, 10, y);
                    doc.setFont(undefined, 'bold');
                    doc.text(risposta, 180, y);
                    doc.setFont(undefined, 'normal');
                    y += (splitText.length * 6);

                    if (nota) {
                        doc.setFontSize(9);
                        doc.setTextColor(100);
                        doc.text(`Note: ${nota}`, 15, y);
                        y += 6;
                        doc.setFontSize(11);
                        doc.setTextColor(0);
                    }

                    if (fotoChecklist[id]) {
                        if (y > 230) { doc.addPage(); y = 20; }
                        doc.addImage(fotoChecklist[id], 'JPEG', 15, y, 40, 30);
                        y += 35;
                    }
                    y += 2;
                });
                y += 5;
            }

            if (y > 240) { doc.addPage(); y = 20; }
            doc.setFont(undefined, 'bold');
            doc.text("Firme di Convalida", 10, y);
            y += 10;
            
            doc.setFontSize(9);
            doc.text("Firma Operatore 1", 10, y);
            if (sigPad1 && !sigPad1.isEmpty()) doc.addImage(sigPad1.toDataURL(), 'PNG', 10, y + 2, 40, 15);
            
            doc.text("Firma Operatore 2", 110, y);
            if (sigPad2 && !sigPad2.isEmpty()) doc.addImage(sigPad2.toDataURL(), 'PNG', 110, y + 2, 40, 15);

            return doc.output('blob');
        };

        window.caricaStorico = async function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'block';
            const container = document.getElementById('lista-verifiche');
            container.innerHTML = "Caricamento...";
            try {
                const { data } = await supabaseClient.from('verifiche_antincendio').select('operatore_1, created_at').limit(10);
                container.innerHTML = data.map(v => `<div class='card-verifica'>${new Date(v.created_at).toLocaleDateString()} - ${v.operatore_1}</div>`).join('');
            } catch(e) { container.innerHTML = "Errore."; }
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dataVerifica').valueAsDate = new Date();
        });
    </script>
</body>
</html>
