<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <!-- Librerie Esterne -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #004a99; 
            --secondary: #8b98a7; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --success: #28a745;
            --danger: #dc3545;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #333; 
            overscroll-behavior: none;
        }
        
        /* Header e Navigazione */
        .header-logo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
        }
        .header-logo img { height: 50px; }

        .btn-home-fixed { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 1001; 
            background: var(--primary); 
            color: white; 
            border: 2px solid white; 
            padding: 8px 15px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .tabs { 
            display: flex; 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            background: none; 
            color: rgba(255,255,255,0.7); 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-bottom: 3px solid transparent; 
            font-size: 0.8rem;
        }
        .tab-btn.active { 
            color: white; 
            border-bottom-color: white; 
            background: rgba(255,255,255,0.1); 
        }

        /* Layout */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { 
            background: var(--white); 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border-left: 6px solid var(--primary); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 12px; line-height: 1.4; color: #444; }
        .opzioni { display: flex; gap: 30px; margin-bottom: 15px; }
        .opzioni label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
        .opzioni input[type="radio"] { width: 20px; height: 20px; }
        
        .sezione-titolo { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 30px 0 15px; 
            text-align: center; 
            font-weight: bold; 
            letter-spacing: 1px;
        }

        /* Firma */
        .signature-container { 
            border: 2px dashed #ccc; 
            background: #fff; 
            margin-top: 10px; 
            border-radius: 8px; 
            position: relative;
            touch-action: none;
        }
        .signature-pad-canvas { 
            width: 100%; 
            height: 180px; 
            display: block; 
            cursor: crosshair; 
        }

        /* Bottoni */
        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }
        
        .btn-clear { 
            margin-top: 8px; 
            background: none; 
            border: 1px solid var(--danger); 
            color: var(--danger); 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
        }
        
        .btn-foto { 
            background: #f8f9fa; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 12px; 
            width: 100%;
            font-size: 0.9rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: #555;
        }
        .area-note { 
            width: 100%; 
            height: 70px; 
            margin-top: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            padding: 10px; 
            box-sizing: border-box; 
            font-family: inherit; 
            resize: none;
        }

        /* Preview Foto */
        .photo-preview {
            display: none;
            margin-top: 10px;
            position: relative;
        }
        .photo-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <button id="btnHomeFisso" class="btn-home-fixed" onclick="tornaAllaHome()">🏠 HOME</button>

    <div class="header-logo">
        <img id="mainLogo" src="pt.png" alt="Logo PT" onerror="this.src='https://via.placeholder.com/200x50?text=Pannelli+Termici'">
    </div>

    <!-- Schermata Home -->
    <div id="home-screen" class="container" style="text-align: center; padding-top: 50px;">
        <h2 style="color: var(--primary);">Controllo Periodico Antincendio</h2>
        <p style="color: var(--secondary);">Gestione verifiche PT S.r.l.</p>
        
        <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px;">
            <button onclick="mostraApp()" class="btn-main">🆕 NUOVA VERIFICA</button>
            <button onclick="caricaStorico()" class="btn-main" style="background: var(--secondary);">📂 ARCHIVIO</button>
        </div>
    </div>

    <!-- App Interface -->
    <div id="app-interface" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn active" id="btn-tab-info" onclick="openTab(event, 'tab-info')">📋 INFO</button>
            <button class="tab-btn" id="btn-tab-check" onclick="openTab(event, 'tab-check')">✅ CHECKLIST</button>
            <button class="tab-btn" id="btn-tab-invio" onclick="openTab(event, 'tab-invio')">✍️ FIRMA</button>
        </nav>

        <!-- Tab Info -->
        <div id="tab-info" class="tab-content container">
            <div class="input-group">
                <label>OPERATORE 1</label>
                <select id="operatore_1">
                    <option value="">Seleziona...</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                    <option value="Petitta Andrea">Petitta Andrea</option>
                    <option value="Ripà Luca">Ripà Luca</option>
                    <option value="Pannelli Gianluca">Pannelli Gianluca</option>
                    <option value="D'Addazio Julio">D'Addazio Julio</option>  
                    <option value="Fidanza Giacinto">Fidanza Giacinto</option> 
                    <option value="Olivieri Matteo">Olivieri Matteo</option> 
                    <option value="D'Amario Angelo">D'Amario Angelo</option>
                    <option value="D'Amario Lorenzo">D'Amario Lorenzo</option> 
                </select>
            </div>
            <div class="input-group">
                <label>OPERATORE 2 (Collaboratore/Ospite)</label>
                <select id="operatore_2">
                    <option value="">Nessuno</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                    <option value="Petitta Andrea">Petitta Andrea</option>
                    <option value="Ripà Luca">Ripà Luca</option>
                    <option value="Pannelli Gianluca">Pannelli Gianluca</option>
                    <option value="D'Addazio Julio">D'Addazio Julio</option>  
                    <option value="Fidanza Giacinto">Fidanza Giacinto</option> 
                    <option value="Olivieri Matteo">Olivieri Matteo</option> 
                    <option value="D'Amario Angelo">D'Amario Angelo</option>
                    <option value="D'Amario Lorenzo">D'Amario Lorenzo</option> 
                </select>
            </div>
            <div class="input-group">
                <label>DATA INTERVENTO</label>
                <input type="date" id="data_verifica">
            </div>
            <button class="btn-main" onclick="document.getElementById('btn-tab-check').click()" style="margin-top: 20px;">AVANTI ➔</button>
        </div>

        <!-- Tab Checklist -->
        <div id="tab-check" class="tab-content container" style="display:none;">
            <div id="checklist-container"></div>
            <button class="btn-main" onclick="document.getElementById('btn-tab-invio').click()" style="margin-top: 20px; background: var(--secondary);">VAI ALLA FIRMA ➔</button>
        </div>

        <!-- Tab Invio -->
        <div id="tab-invio" class="tab-content container" style="display:none;">
            <h3 style="color: var(--primary); margin-bottom: 5px;">Firma Operatore 1</h3>
            <div class="signature-container">
                <canvas id="signature-pad-1" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="cancellaFirma(1)">CANCELLA FIRMA 1</button>

            <div id="container-firma-2">
                <h3 style="color: var(--primary); margin-top: 30px; margin-bottom: 5px;">Firma Operatore 2</h3>
                <div class="signature-container">
                    <canvas id="signature-pad-2" class="signature-pad-canvas"></canvas>
                </div>
                <button class="btn-clear" onclick="cancellaFirma(2)">CANCELLA FIRMA 2</button>
            </div>
            
            <button id="btnInvia" class="btn-main" style="background: var(--success); margin-top: 50px;" onclick="inviaVerifica()">🚀 SALVA E INVIA REPORT</button>
            <p style="font-size: 11px; text-align: center; color: #888; margin-top: 15px;">Il PDF verrà inviato a: geom.rip@gmail.com</p>
        </div>
    </div>

    <!-- Archivio -->
    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Ultime 10 Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="tornaAllaHome()" class="btn-main" style="background: var(--secondary); margin-top: 20px;">TORNA ALLA HOME</button>
    </div>

    <script>
        // --- CONFIGURAZIONE SUPABASE ---
        const SB_URL = "https://vnzrewcbnoqbqvzckome.supabase.co";
        const SB_KEY = "sb_publishable_Sq9txbu-PmKdbxETSx2cjw_WqWEFBPO"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Variabili Globali
        let sigPad1 = null;
        let sigPad2 = null;
        let fotoChecklist = {};

        const sezioni = {
            "estintori": [
                "Gli estintori sono segnalati da apposita cartellonistica?",
                "Gli estintori sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sugli estintori?",
                "L’ultimo controllo sugli estintori da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "idranti": [
                "Gli idranti sono segnalati da apposita cartellonistica?",
                "Gli idranti sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie sugli idranti?",
                "L’ultimo controllo sugli idranti è stato effettuato non oltre sei mesi fa?"
            ],
            "luci_di_emergenza": [
                "Le luci di emergenza sono correttamente funzionanti?",
                "Si è potuta riscontrare l’ASSENZA di anomalie sulle luci?"
            ],
            "impianto_irai": [
                "I dispositivi IRAI sono prontamente individuabili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie sui dispositivi IRAI?"
            ],
            "porte_tagliafuoco": [
                "Le porte tagliafuoco sono correttamente segnalate e libere?",
                "Le prove di apertura/chiusura hanno confermato il corretto funzionamento?",
                "L’ultimo controllo è stato effettuato non oltre sei mesi fa?"
            ],
            "vie_di_esodo": [
                "Le vie di esodo sono segnalate?",
                "I percorsi sono privi di ostacoli?",
                "Le vie di esodo sono adeguatamente illuminate?"
            ]
        };

        // --- GESTIONE INTERFACCIA ---
        window.mostraApp = function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            fotoChecklist = {};
            window.renderChecklist();
            window.openTab(null, 'tab-info');
        };

        window.tornaAllaHome = function() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('app-interface').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'none';
            document.getElementById('btnHomeFisso').style.display = 'none';
        };

        window.openTab = function(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            if (evt) evt.currentTarget.classList.add("active");
            else document.getElementById('btn-' + tabName).classList.add("active");
            if (tabName === 'tab-invio') setTimeout(initSignatures, 300);
            window.scrollTo(0,0);
        };

        window.renderChecklist = function() {
            const container = document.getElementById('checklist-container');
            let html = '';
            for (const [key, domande] of Object.entries(sezioni)) {
                html += `<div class="sezione-titolo">${key.toUpperCase().replace(/_/g, ' ')}</div>`;
                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    html += `
                        <div class="card-verifica">
                            <span class="domanda-testo">${domanda}</span>
                            <div class="opzioni">
                                <label><input type="radio" name="${id}" value="SI"> SI</label>
                                <label><input type="radio" name="${id}" value="NO"> NO</label>
                            </div>
                            <button class="btn-foto" onclick="document.getElementById('input_${id}').click()">📷 FOTO</button>
                            <div id="preview_${id}" class="photo-preview"><img id="img_${id}" src=""></div>
                            <textarea id="note_${id}" class="area-note" placeholder="Note..."></textarea>
                            <input type="file" id="input_${id}" style="display:none" accept="image/*" capture="environment" onchange="caricaFoto(event, '${id}')">
                        </div>`;
                });
            }
            container.innerHTML = html;
        };

        window.caricaFoto = function(event, id) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoChecklist[id] = e.target.result;
                    document.getElementById(`img_${id}`).src = e.target.result;
                    document.getElementById(`preview_${id}`).style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        window.initSignatures = function() {
            const c1 = document.getElementById('signature-pad-1');
            const c2 = document.getElementById('signature-pad-2');
            if (c1) { sigPad1 = new SignaturePad(c1); resizeCanvas(c1, sigPad1); }
            if (c2) { sigPad2 = new SignaturePad(c2); resizeCanvas(c2, sigPad2); }
        };

        function resizeCanvas(canvas, pad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            pad.clear();
        }

        window.cancellaFirma = function(n) { n === 1 ? sigPad1.clear() : sigPad2.clear(); };

        window.inviaVerifica = async function() {
            const op1 = document.getElementById('operatore_1').value;
            const op2 = document.getElementById('operatore_2').value;
            
            if (!op1) { alert("Operatore 1 obbligatorio!"); return; }
            if (sigPad1.isEmpty()) { alert("Firma obbligatoria!"); return; }

            const btn = document.getElementById('btnInvia');
            btn.disabled = true;
            btn.innerText = "⏳ INVIO IN CORSO...";

            try {
                // 1. Salvataggio su DB (created_at è automatico)
                const payload = { 
                    operatore_1: op1, 
                    operatore_2: op2 || null,
                    processato: false
                };

                const { data: saved, error: dbError } = await supabaseClient
                    .from('verifiche_antincendio')
                    .insert([payload])
                    .select();

                if (dbError) throw dbError;

                // 2. Chiamata alla Edge Function (nome: 'antincendio')
                // Inviamo il record appena salvato affinché la funzione lo processi
                await supabaseClient.functions.invoke('antincendio', {
                    body: { record: saved[0] }
                });

                alert("✅ VERIFICA SALVATA E REPORT INVIATO!");
                window.tornaAllaHome();

            } catch (e) {
                alert("Errore: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 SALVA E INVIA REPORT";
            }
        };

        window.caricaStorico = async function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            
            const container = document.getElementById('lista-verifiche');
            container.innerHTML = "Caricamento...";
            
            try {
                const { data, error } = await supabaseClient
                    .from('verifiche_antincendio')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (error) throw error;

                container.innerHTML = data.map(v => `
                    <div class="card-verifica">
                        <strong>${new Date(v.created_at).toLocaleString('it-IT')}</strong><br>
                        <span>Operatore: ${v.operatore_1}</span>
                    </div>
                `).join('');
            } catch(e) { 
                container.innerHTML = "Errore caricamento.";
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('data_verifica').valueAsDate = new Date();
        });
    </script>
</body>
</html>
