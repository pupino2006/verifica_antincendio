<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <!-- Librerie Esterne -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #004a99; 
            --secondary: #8b98a7; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --success: #28a745;
            --danger: #dc3545;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #333; 
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Header e Navigazione */
        .header-logo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
        }
        .header-logo img { height: 50px; }

        .btn-home-fixed { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 1001; 
            background: var(--primary); 
            color: white; 
            border: 2px solid white; 
            padding: 8px 15px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .tabs { 
            display: flex; 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            background: none; 
            color: rgba(255,255,255,0.7); 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-bottom: 3px solid transparent; 
            font-size: 0.8rem;
        }
        .tab-btn.active { 
            color: white; 
            border-bottom-color: white; 
            background: rgba(255,255,255,0.1); 
        }

        /* Layout */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { 
            background: var(--white); 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border-left: 6px solid var(--primary); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 12px; line-height: 1.4; color: #444; }
        .opzioni { display: flex; gap: 30px; margin-bottom: 15px; }
        .opzioni label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
        
        .sezione-titolo { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 30px 0 15px; 
            text-align: center; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        /* Firma */
        .signature-container { 
            border: 2px dashed #ccc; 
            background: #fff; 
            margin-top: 10px; 
            border-radius: 8px; 
            touch-action: none;
        }
        .signature-pad-canvas { 
            width: 100%; 
            height: 180px; 
            display: block; 
        }

        /* Bottoni */
        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .btn-main:disabled { background: var(--secondary); opacity: 0.7; }
        
        .btn-clear { 
            margin-top: 8px; 
            background: none; 
            border: 1px solid var(--danger); 
            color: var(--danger); 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold;
        }
        
        .btn-foto { 
            background: #f8f9fa; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 12px; 
            width: 100%;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: #555;
        }
        .area-note { 
            width: 100%; 
            height: 70px; 
            margin-top: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            padding: 10px; 
            box-sizing: border-box; 
            resize: none;
        }

        .photo-preview { display: none; margin-top: 10px; }
        .photo-preview img { width: 100%; border-radius: 8px; }

        /* Loader Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 2rem; margin-bottom: 20px;">⌛</div>
        <div id="loading-text">Salvataggio in corso...</div>
    </div>

    <button id="btnHomeFisso" class="btn-home-fixed" onclick="tornaAllaHome()">🏠 HOME</button>

    <div class="header-logo">
        <img id="mainLogo" src="pt.png" alt="Logo PT" onerror="this.src='https://via.placeholder.com/200x50?text=Pannelli+Termici'">
    </div>

    <!-- Schermata Home -->
    <div id="home-screen" class="container" style="text-align: center; padding-top: 50px;">
        <h2 style="color: var(--primary);">Controllo Periodico Antincendio</h2>
        <p style="color: var(--secondary);">Gestione verifiche PT S.r.l.</p>
        
        <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px;">
            <button onclick="mostraApp()" class="btn-main">🆕 NUOVA VERIFICA</button>
            <button onclick="caricaStorico()" class="btn-main" style="background: var(--secondary);">📂 ARCHIVIO</button>
        </div>
    </div>

    <!-- App Interface -->
    <div id="app-interface" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn" id="btn-tab-info" onclick="openTab(event, 'tab-info')">📋 INFO</button>
            <button class="tab-btn" id="btn-tab-check" onclick="openTab(event, 'tab-check')">✅ CHECKLIST</button>
            <button class="tab-btn" id="btn-tab-invio" onclick="openTab(event, 'tab-invio')">✍️ FIRMA</button>
        </nav>

        <!-- Tab Info -->
        <div id="tab-info" class="tab-content container">
            <div class="input-group">
                <label>OPERATORE 1</label>
                <select id="operatore_1">
                    <option value="">Seleziona...</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                    <option value="Petitta Andrea">Petitta Andrea</option>
                    <option value="Ripà Luca">Ripà Luca</option>
                    <option value="Pannelli Gianluca">Pannelli Gianluca</option>
                    <option value="D'Addazio Julio">D'Addazio Julio</option>  
                    <option value="Fidanza Giacinto">Fidanza Giacinto</option> 
                    <option value="Olivieri Matteo">Olivieri Matteo</option> 
                    <option value="D'Amario Angelo">D'Amario Angelo</option>
                    <option value="D'Amario Lorenzo">D'Amario Lorenzo</option> 
                </select>
            </div>
            <div class="input-group">
                <label>OPERATORE 2 (Collaboratore/Ospite)</label>
                <select id="operatore_2">
                    <option value="">Nessuno</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                    <option value="Petitta Andrea">Petitta Andrea</option>
                    <option value="Ripà Luca">Ripà Luca</option>
                    <option value="Pannelli Gianluca">Pannelli Gianluca</option>
                    <option value="D'Addazio Julio">D'Addazio Julio</option>  
                    <option value="Fidanza Giacinto">Fidanza Giacinto</option> 
                    <option value="Olivieri Matteo">Olivieri Matteo</option> 
                    <option value="D'Amario Angelo">D'Amario Angelo</option>
                    <option value="D'Amario Lorenzo">D'Amario Lorenzo</option> 
                </select>
            </div>
            <div class="input-group">
                <label>DATA INTERVENTO</label>
                <input type="date" id="dataVerifica">
            </div>
            <button class="btn-main" onclick="openTab(null, 'tab-check')" style="margin-top: 20px;">AVANTI ➔</button>
        </div>

        <!-- Tab Checklist -->
        <div id="tab-check" class="tab-content container" style="display:none;">
            <div id="checklist-container"></div>
            <button class="btn-main" onclick="openTab(null, 'tab-invio')" style="margin-top: 20px; background: var(--secondary);">VAI ALLA FIRMA ➔</button>
        </div>

        <!-- Tab Invio -->
        <div id="tab-invio" class="tab-content container" style="display:none;">
            <h3 style="color: var(--primary); margin-bottom: 5px;">Firma Operatore 1</h3>
            <div class="signature-container">
                <canvas id="signature-pad-1" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="cancellaFirma(1)">CANCELLA FIRMA 1</button>

            <h3 style="color: var(--primary); margin-top: 30px; margin-bottom: 5px;">Firma Operatore 2</h3>
            <div class="signature-container">
                <canvas id="signature-pad-2" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="cancellaFirma(2)">CANCELLA FIRMA 2</button>
            
            <button id="btnInvia" class="btn-main" style="background: var(--success); margin-top: 50px;" onclick="inviaVerifica()">🚀 SALVA E INVIA REPORT</button>
            <p style="font-size: 11px; text-align: center; color: #888; margin-top: 15px;">Il PDF verrà archiviato e inviato alla sede centrale.</p>
        </div>
    </div>

    <!-- Archivio -->
    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Ultime Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="tornaAllaHome()" class="btn-main" style="background: var(--secondary); margin-top: 20px;">TORNA ALLA HOME</button>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        const SB_URL = "https://vnzrewcbnoqbqvzckome.supabase.co";
        const SB_KEY = "sb_publishable_Sq9txbu-PmKdbxETSx2cjw_WqWEFBPO"; // Sostituire con service role se necessario o gestire auth
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let sigPad1, sigPad2;
        let fotoChecklist = {};

        const sezioni = {
            "estintori": [
                "Gli estintori sono segnalati da apposita cartellonistica?",
                "Gli estintori sono prontamente individuabili e facilmente accessibili?",
                "Assenza di anomalie e/o fattori di pericolo (manometro, integrità, spina)?",
                "L’ultimo controllo non è più vecchio di sei mesi?"
            ],
            "idranti": [
                "Gli idranti sono segnalati da apposita cartellonistica?",
                "Gli idranti sono prontamente individuabili e facilmente accessibili?",
                "Assenza di anomalie (lancia, manichetta avvolta, cassetta)?",
                "L’ultimo controllo non è più vecchio di sei mesi?"
            ],
            "luci_di_emergenza": [
                "Le luci di emergenza sono funzionanti?",
                "Assenza di anomalie (batterie, cartellonistica)?"
            ],
            "impianto_irai": [
                "Rivelatori e pulsanti sono accessibili e segnalati?",
                "Assenza di anomalie sui dispositivi?"
            ],
            "porte_tagliafuoco": [
                "Porte segnalate e libere da ostacoli?",
                "Le prove di apertura/chiusura sono conformi?",
                "L'ultimo controllo non è più vecchio di sei mesi?"
            ],
            "vie_di_esodo": [
                "Percorsi segnalati e liberi da ostacoli?",
                "Le vie di esodo sono adeguatamente illuminate?",
                "Assenza di materiali infiammabili sui percorsi?"
            ]
        };

        // --- CORE FUNCTIONS ---
        window.mostraApp = () => {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            renderChecklist();
            openTab(null, 'tab-info');
        };

        window.tornaAllaHome = () => {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('app-interface').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'none';
            document.getElementById('btnHomeFisso').style.display = 'none';
        };

        window.openTab = (evt, tabName) => {
            document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            
            document.getElementById(tabName).style.display = "block";
            const targetBtn = evt ? evt.currentTarget : document.getElementById('btn-' + tabName);
            targetBtn.classList.add("active");

            if (tabName === 'tab-invio') setTimeout(initSignatures, 200);
            window.scrollTo(0,0);
        };

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            let html = '';
            for (const [key, domande] of Object.entries(sezioni)) {
                html += `<div class="sezione-titolo">${key.replace(/_/g, ' ')}</div>`;
                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    html += `
                        <div class="card-verifica">
                            <span class="domanda-testo">${domanda}</span>
                            <div class="opzioni">
                                <label><input type="radio" name="${id}" value="SI"> SI</label>
                                <label><input type="radio" name="${id}" value="NO"> NO</label>
                            </div>
                            <button class="btn-foto" onclick="document.getElementById('input_${id}').click()">📷 FOTO</button>
                            <div id="preview_${id}" class="photo-preview"><img id="img_${id}"></div>
                            <textarea id="note_${id}" class="area-note" placeholder="Note aggiuntive..."></textarea>
                            <input type="file" id="input_${id}" style="display:none" accept="image/*" capture="environment" onchange="caricaFoto(event, '${id}')">
                        </div>`;
                });
            }
            container.innerHTML = html;
        }

        window.caricaFoto = (e, id) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                fotoChecklist[id] = ev.target.result;
                document.getElementById(`img_${id}`).src = ev.target.result;
                document.getElementById(`preview_${id}`).style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        function initSignatures() {
            const canvas1 = document.getElementById('signature-pad-1');
            const canvas2 = document.getElementById('signature-pad-2');
            
            const resize = (canvas) => {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
            };

            if (!sigPad1) {
                resize(canvas1);
                sigPad1 = new SignaturePad(canvas1);
            }
            if (!sigPad2) {
                resize(canvas2);
                sigPad2 = new SignaturePad(canvas2);
            }
        }

        window.cancellaFirma = (n) => (n === 1 ? sigPad1 : sigPad2).clear();

        // --- INVIO E PDF ---
        window.inviaVerifica = async () => {
            const op1 = document.getElementById('operatore_1').value;
            const dataV = document.getElementById('dataVerifica').value;

            if (!op1 || !dataV || sigPad1.isEmpty()) {
                alert("Compila Operatore 1, Data e Firma Obbligatoria.");
                return;
            }

            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';

            try {
                // 1. Inserimento Database per ottenere ID
                const { data, error } = await supabaseClient.from('verifiche_antincendio').insert([{
                    operatore_1: op1,
                    operatore_2: document.getElementById('operatore_2').value || null,
                    data_ispezione: dataV,
                    processato: false
                }]).select();

                if (error) throw error;
                const recordId = data[0].id;

                // 2. Generazione PDF
                const pdfBlob = await generaPDF();
                const fileName = `report_${recordId}.pdf`;

                // 3. Caricamento su Storage
                const { error: uploadError } = await supabaseClient.storage
                    .from('ai_verifiche')
                    .upload(fileName, pdfBlob, { contentType: 'application/pdf' });
                
                if (uploadError) throw uploadError;

                // 4. Update PDF URL nel DB
                const { data: urlData } = supabaseClient.storage.from('ai_verifiche').getPublicUrl(fileName);
                await supabaseClient.from('verifiche_antincendio')
                    .update({ pdf_url: urlData.publicUrl, processato: true })
                    .eq('id', recordId);

                alert("✅ Verifica inviata con successo!");
                tornaAllaHome();
            } catch (err) {
                alert("Errore: " + err.message);
            } finally {
                overlay.style.display = 'none';
            }
        };

        async function generaPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 20;

            doc.setFontSize(18);
            doc.setTextColor(0, 74, 153);
            doc.text("REPORT VERIFICA ANTINCENDIO", 10, y);
            
            y += 15;
            doc.setFontSize(10);
            doc.setTextColor(0);
            doc.text(`Operatore 1: ${document.getElementById('operatore_1').value}`, 10, y);
            doc.text(`Data: ${document.getElementById('dataVerifica').value}`, 120, y);
            
            y += 10;
            for (const [key, domande] of Object.entries(sezioni)) {
                if (y > 260) { doc.addPage(); y = 20; }
                doc.setFont(undefined, 'bold');
                doc.setFillColor(240, 240, 240);
                doc.rect(10, y, 190, 7, 'F');
                doc.text(key.toUpperCase().replace(/_/g, ' '), 12, y + 5);
                y += 12;
                doc.setFont(undefined, 'normal');

                domande.forEach((dom, i) => {
                    const id = `${key}_q${i}`;
                    const resp = document.querySelector(`input[name="${id}"]:checked`)?.value || "N.D.";
                    const nota = document.getElementById(`note_${id}`).value;

                    const lines = doc.splitTextToSize(`${i+1}. ${dom}`, 150);
                    doc.text(lines, 10, y);
                    doc.setFont(undefined, 'bold');
                    doc.text(resp, 170, y);
                    doc.setFont(undefined, 'normal');
                    
                    y += (lines.length * 5) + 2;

                    if (nota) {
                        doc.setFontSize(8);
                        doc.text(`Nota: ${nota}`, 15, y);
                        y += 5;
                        doc.setFontSize(10);
                    }
                    if (y > 270) { doc.addPage(); y = 20; }
                });
                y += 5;
            }

            // Aggiunta Firme
            doc.addPage();
            doc.text("FIRME", 10, 20);
            if (!sigPad1.isEmpty()) doc.addImage(sigPad1.toDataURL(), 'PNG', 10, 30, 60, 30);
            if (!sigPad2.isEmpty()) doc.addImage(sigPad2.toDataURL(), 'PNG', 110, 30, 60, 30);

            return doc.output('blob');
        }

        window.caricaStorico = async () => {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            
            const list = document.getElementById('lista-verifiche');
            list.innerHTML = "Caricamento...";

            const { data, error } = await supabaseClient
                .from('verifiche_antincendio')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(15);

            if (error) list.innerHTML = "Errore caricamento.";
            else {
                list.innerHTML = data.map(v => `
                    <div class="card-verifica" style="border-left-color: #666;">
                        <div style="display:flex; justify-content:space-between;">
                            <span>${new Date(v.data_ispezione).toLocaleDateString()}</span>
                            <a href="${v.pdf_url}" target="_blank" style="color:var(--primary); font-weight:bold;">PDF 📄</a>
                        </div>
                        <div style="font-size:0.8rem; margin-top:5px;">Operatore: ${v.operatore_1}</div>
                    </div>
                `).join('');
            }
        };

        window.onload = () => {
            document.getElementById('dataVerifica').valueAsDate = new Date();
        };
    </script>
</body>
</html>
