<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <!-- Librerie Esterne -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #004a99; 
            --secondary: #8b98a7; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --success: #28a745;
            --danger: #dc3545;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #333; 
            overscroll-behavior: none;
        }
        
        /* Header e Navigazione */
        .header-logo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
        }
        .header-logo img { height: 50px; }

        .btn-home-fixed { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 1001; 
            background: var(--primary); 
            color: white; 
            border: 2px solid white; 
            padding: 8px 15px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .tabs { 
            display: flex; 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            background: none; 
            color: rgba(255,255,255,0.7); 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-bottom: 3px solid transparent; 
            font-size: 0.8rem;
        }
        .tab-btn.active { 
            color: white; 
            border-bottom-color: white; 
            background: rgba(255,255,255,0.1); 
        }

        /* Layout */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { 
            background: var(--white); 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border-left: 6px solid var(--primary); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 12px; line-height: 1.4; color: #444; }
        .opzioni { display: flex; gap: 30px; margin-bottom: 15px; }
        .opzioni label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
        .opzioni input[type="radio"] { width: 20px; height: 20px; }
        
        .sezione-titolo { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 30px 0 15px; 
            text-align: center; 
            font-weight: bold; 
            letter-spacing: 1px;
        }

        /* Firma */
        .signature-container { 
            border: 2px dashed #ccc; 
            background: #fff; 
            margin-top: 10px; 
            border-radius: 8px; 
            position: relative;
            touch-action: none;
        }
        .signature-pad-canvas { 
            width: 100%; 
            height: 180px; 
            display: block; 
            cursor: crosshair; 
        }

        /* Bottoni */
        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }
        
        .btn-clear { 
            margin-top: 8px; 
            background: none; 
            border: 1px solid var(--danger); 
            color: var(--danger); 
            padding: 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
        }
        
        .btn-foto { 
            background: #f8f9fa; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 12px; 
            width: 100%;
            font-size: 0.9rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: #555;
        }
        .area-note { 
            width: 100%; 
            height: 70px; 
            margin-top: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            padding: 10px; 
            box-sizing: border-box; 
            font-family: inherit; 
            resize: none;
        }

        /* Preview Foto */
        .photo-preview {
            display: none;
            margin-top: 10px;
            position: relative;
        }
        .photo-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

            <div class="input-group">
                <label>OPERATORE 2 (Collaboratore/Ospite)</label>
                <select id="operatore_2">
                    <option value="">Nessuno</option>

            <p style="font-size: 11px; text-align: center; color: #888; margin-top: 15px;">Il PDF verrà inviato a: geom.rip@gmail.com</p>

    <!-- Archivio -->
    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Ultime 10 Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="tornaAllaHome()" class="btn-main" style="background: var(--secondary); margin-top: 20px;">TORNA ALLA HOME</button>
    </div>

    <script>
        // --- CONFIGURAZIONE SUPABASE ---
        const SB_URL = "https://vnzrewcbnoqbqvzckome.supabase.co";
        const SB_KEY = "sb_publishable_Sq9txbu-PmKdbxETSx2cjw_WqWEFBPO"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Variabili Globali
        let sigPad1 = null;
        let sigPad2 = null;
        let fotoChecklist = {};

        const sezioni = {
            "estintori": [
                "Gli estintori sono segnalati da apposita cartellonistica?",
                "Gli estintori sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sugli estintori (es. manometro al di fuori della zona verde, ammaccature e/o crepe, spina di sicurezza mancante, ecc.)?",
                "L’ultimo controllo sugli estintori da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "idranti": [
                "Gli idranti sono segnalati da apposita cartellonistica?",
                "Gli idranti sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sugli idranti (es. mancanza di lancia erogatrice, manichetta non correttamente avvolta, cassetta ammaccata, ecc.)?",
                "L’ultimo controllo sugli idranti da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "luci_di_emergenza": [
                "Le luci di emergenza sono correttamente funzionanti in caso di mancanza di alimentazione elettrica?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle luci di emergenza (es. mancanza cartellonistica, malfunzionamento batterie, ecc.)?"
            ],
            "impianto_irai": [
                "I dispositivi di rilevazione automatica e i pulsanti manuali di allarme incendio sono prontamente individuabili e facilmente accessibili?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sui dispositivi dell’IRAI (es. rilevatori non adeguatamente puliti, mancata attivazione, ecc.)?"
            ],
            "porte_tagliafuoco": [
                "Le porte tagliafuoco sono correttamente segnalate da specifica cartellonistica, e priva di ostacoli alla loro apertura e/o chiusura?",
                "Le prove di aperture e/o chiusura delle porte tagliafuoco ha confermato il loro corretto funzionamento?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle porte tagliafuoco (es. porta chiusa a chiave, maniglione rotto, ecc.)?",
                "L’ultimo controllo sulle porte tagliafuoco da parte di ditta specializzata è stato effettuato non oltre sei mesi fa?"
            ],
            "vie_di_esodo": [
                "Le vie di esodo e le uscite di sicurezza sono segnalate mediante apposita cartellonistica?",
                "I percorsi di esodo sono privi di materiale che potrebbe fungere da ostacolo all’esodo stesso?",
                "Le vie di esodo sono adeguatamente illuminate?",
                "Si è potuta riscontrare l’ASSENZA di anomalie e/o fattori di pericolo sulle vie di esodo e le uscite di sicurezza (es. presenza di combustibili e/o infiammabili, porte non apribili, ecc.)?"
            ]
        };

        // --- GESTIONE INTERFACCIA ---
        window.mostraApp = function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            fotoChecklist = {}; // Resetta le foto per la nuova sessione
            window.renderChecklist();
            window.openTab(null, 'tab-info');
        };

        window.tornaAllaHome = function() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('app-interface').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'none';
            document.getElementById('btnHomeFisso').style.display = 'none';
        };

        window.openTab = function(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            
            document.getElementById(tabName).style.display = "block";
            
            if (evt) evt.currentTarget.classList.add("active");
            else document.getElementById('btn-' + tabName).classList.add("active");

            // Gestione specifica per il tab firma per inizializzare i canvas
            if (tabName === 'tab-invio') {
                setTimeout(initSignatures, 300);
            }
            window.scrollTo(0,0);
        };

        // --- RENDER CHECKLIST ---
        window.renderChecklist = function() {
            const container = document.getElementById('checklist-container');
            let html = '';
            for (const [key, domande] of Object.entries(sezioni)) {
                html += `<div class="sezione-titolo">${key.toUpperCase().replace(/_/g, ' ')}</div>`;
                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    html += `
                        <div class="card-verifica">
                            <span class="domanda-testo">${domanda}</span>
                            <div class="opzioni">
                                <label><input type="radio" name="${id}" value="SI"> SI</label>
                                <label><input type="radio" name="${id}" value="NO"> NO</label>
                            </div>
                            <button class="btn-foto" onclick="document.getElementById('input_${id}').click()">📷 SCATTA O CARICA FOTO</button>
                            <div id="preview_${id}" class="photo-preview">
                                <img id="img_${id}" src="">
                            </div>
                            <textarea id="note_${id}" class="area-note" placeholder="Aggiungi eventuali note o anomalie..."></textarea>
                            <input type="file" id="input_${id}" style="display:none" accept="image/*" capture="environment" onchange="caricaFoto(event, '${id}')">
                        </div>`;
                });
            }
            container.innerHTML = html;
        };

        window.caricaFoto = function(event, id) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoChecklist[id] = e.target.result;
                    document.getElementById(`img_${id}`).src = e.target.result;
                    document.getElementById(`preview_${id}`).style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // --- GESTIONE FIRMA ---
        window.initSignatures = function() {
            const c1 = document.getElementById('signature-pad-1');
            const c2 = document.getElementById('signature-pad-2');
            
            if (c1) {
                sigPad1 = new SignaturePad(c1, { penColor: 'rgb(0, 0, 0)' });
                resizeCanvas(c1, sigPad1);
            }
            if (c2) {
                sigPad2 = new SignaturePad(c2, { penColor: 'rgb(0, 0, 0)' });
                resizeCanvas(c2, sigPad2);
            }
        };

        function resizeCanvas(canvas, pad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            pad.clear(); // Pulisce per evitare stiramenti
        }

        window.cancellaFirma = function(n) {
            if (n === 1) sigPad1.clear();
            else sigPad2.clear();
        };

        // --- UTILITY PER IMMAGINI ---
        async function getBase64ImageFromURL(url) {
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (err) { 
                console.error("Errore caricamento immagine:", url);
                return null; 
            }
        }

        // --- SALVATAGGIO E INVIO ---
        window.inviaVerifica = async function() {
            const op1 = document.getElementById('operatore_1').value;
            const op2 = document.getElementById('operatore_2').value;
            const data_verifica = document.getElementById('data_verifica').value;
            
            if (!op1 || !data_verifica) {
                alert("Per favore, compila l'Operatore 1 e la Data nel tab INFO.");
                window.openTab(null, 'tab-info');
                return;
            }

            if (sigPad1.isEmpty()) {
                alert("La firma dell'Operatore 1 è obbligatoria!");
                return;
            }

            const btn = document.getElementById('btnInvia');
            btn.disabled = true;
            btn.innerText = "⏳ ELABORAZIONE IN CORSO...";

            try {
                // 1. Prepara il payload per il Database
                const payload = { 
                    operatore_1: op1, 
                    operatore_2: op2 || null,
                    data_ispezione: data_verifica,
                    // Puoi aggiungere qui una stringa JSON con tutte le risposte se necessario nel DB
                    note_generali: "Generato da Web App"
                };

                // 2. Salvataggio su Supabase DB
                const { error: dbError } = await supabaseClient.from('verifiche_antincendio').insert([payload]);
                if (dbError) throw dbError;

                // 3. Genera il PDF
                const pdfBlob = await window.generaPDF();
                
                // 4. Conversione PDF in Base64 per la mail
                const reader = new FileReader();
                const pdfBase64 = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(pdfBlob);
                });

                // 5. Invocazione Edge Function (Invio Mail)
                try {
                    const { data: fnData, error: fnError } = await supabaseClient.functions.invoke('send-report', {
                        body: { 
                            pdfBase64: pdfBase64, 
                            operatore: op1, 
                            data: data_verifica,
                            destinatario: "geom.rip@gmail.com" 
                        },
                    });
                    if (fnError) console.error("Errore Mail:", fnError);
                } catch (fnErr) {
                    console.warn("Possibile problema con la Edge Function:", fnErr);
                }

                // 6. Download Locale per l'utente
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Verifica_Antincendio_${op1.replace(/\s+/g, '_')}_${data_verifica}.pdf`;
                a.click();

                alert("✅ VERIFICA SALVATA!\nIl report è stato salvato nel database e inviato via mail.");
                window.tornaAllaHome();

            } catch (e) {
                alert("Errore critico: " + e.message);
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 SALVA E INVIA REPORT";
            }
        };

        window.generaPDF = async function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 15;

            // Logo in alto a destra
            const logoBase64 = await getBase64ImageFromURL('pt.png');
            if (logoBase64) {
                doc.addImage(logoBase64, 'PNG', 150, 10, 45, 12);
            }

            // Titolo
            doc.setFontSize(18);
            doc.setTextColor(0, 74, 153);
            doc.setFont(undefined, 'bold');
            doc.text("VERIFICA PERIODICA ANTINCENDIO", 10, 22);
            
            y = 35;
            doc.setFontSize(10);
            doc.setTextColor(50);
            doc.setFont(undefined, 'normal');
            doc.text(`Operatore 1: ${document.getElementById('operatore_1').value}`, 10, y);
            doc.text(`Operatore 2: ${document.getElementById('operatore_2').value || 'N/A'}`, 10, y + 6);
            doc.text(`Data Intervento: ${document.getElementById('data_verifica').value}`, 110, y);
            
            y += 18;

            // Ciclo sezioni
            for (const [key, domande] of Object.entries(sezioni)) {
                // Intestazione Sezione
                if (y > 250) { doc.addPage(); y = 20; }
                doc.setFont(undefined, 'bold');
                doc.setFillColor(0, 74, 153);
                doc.rect(10, y - 5, 190, 8, 'F');
                doc.setTextColor(255);
                doc.text(key.toUpperCase().replace(/_/g, ' '), 12, y);
                y += 10;
                doc.setTextColor(0);
                doc.setFont(undefined, 'normal');

                domande.forEach((domanda, index) => {
                    const id = `${key}_q${index}`;
                    const risposta = document.querySelector(`input[name="${id}"]:checked`)?.value || "N.D.";
                    const nota = document.getElementById(`note_${id}`).value;

                    if (y > 250) { doc.addPage(); y = 20; }
                    
                    // Domanda + Risposta
                    const splitDomanda = doc.splitTextToSize(`${index + 1}. ${domanda}`, 165);
                    doc.text(splitDomanda, 10, y);
                    doc.setFont(undefined, 'bold');
                    doc.text(risposta, 185, y);
                    doc.setFont(undefined, 'normal');
                    y += (splitDomanda.length * 6);

                    // Note se presenti
                    if (nota) {
                        doc.setFontSize(8);
                        doc.setTextColor(100);
                        const splitNota = doc.splitTextToSize(`Nota: ${nota}`, 160);
                        doc.text(splitNota, 15, y);
                        y += (splitNota.length * 5);
                        doc.setFontSize(10);
                        doc.setTextColor(0);
                    }

                    // Foto se presente
                    if (fotoChecklist[id]) {
                        if (y > 220) { doc.addPage(); y = 20; }
                        doc.addImage(fotoChecklist[id], 'JPEG', 15, y, 40, 30);
                        y += 35;
                    }
                    y += 2; // Spazio tra domande
                });
                y += 5; // Spazio tra sezioni
            }

            // Firme
            if (y > 240) { doc.addPage(); y = 20; }
            doc.setFont(undefined, 'bold');
            doc.text("Firme di Convalida", 10, y);
            y += 10;
            
            doc.setFontSize(8);
            doc.text("Firma Operatore 1", 10, y);
            if (sigPad1 && !sigPad1.isEmpty()) {
                doc.addImage(sigPad1.toDataURL(), 'PNG', 10, y + 2, 50, 20);
            }
            
            if (!sigPad2.isEmpty()) {
                doc.text("Firma Operatore 2", 110, y);
                doc.addImage(sigPad2.toDataURL(), 'PNG', 110, y + 2, 50, 20);
            }

            return doc.output('blob');
        };

        // --- STORICO ---
        window.caricaStorico = async function() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            
            const container = document.getElementById('lista-verifiche');
            container.innerHTML = "<p style='text-align:center;'>Caricamento in corso...</p>";
            
            try {
                const { data, error } = await supabaseClient
                    .from('verifiche_antincendio')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Nessun report trovato.</p>";
                    return;
                }

                container.innerHTML = data.map(v => `
                    <div class="card-verifica" style="border-left-color: #8b98a7;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${new Date(v.data_ispezione || v.created_at).toLocaleDateString()}</strong><br>
                                <span style="font-size:0.9rem; color:#666;">Operatore: ${v.operatore_1}</span>
                            </div>
                            <span style="font-size:12px; background:#eee; padding:4px 8px; border-radius:4px;">ID: ${v.id}</span>
                        </div>
                    </div>
                `).join('');
            } catch(e) { 
                container.innerHTML = "<p style='color:red; text-align:center;'>Errore nel caricamento dei dati.</p>";
            }
        };

        // Init Data Odierna
        window.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('data_verifica');
            if (dateInput) dateInput.valueAsDate = new Date();
        });
    </script>
</body>
</html>
