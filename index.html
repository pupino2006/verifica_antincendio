<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <!-- Librerie Esterne -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #004a99; --secondary: #8b98a7; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Header e Navigazione */
        .header-logo { display: flex; justify-content: center; align-items: center; padding: 15px; background: var(--white); border-bottom: 1px solid #ddd; }
        .header-logo img { height: 50px; }

        .btn-home-fixed { position: fixed; top: 15px; left: 15px; z-index: 1000; background: var(--primary); color: white; border: 2px solid white; padding: 8px 15px; border-radius: 25px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; color: rgba(255,255,255,0.7); font-weight: bold; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: white; border-bottom-color: white; background: #003366; }

        /* Form e Card */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { background: var(--white); padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 10px; line-height: 1.4; }
        .opzioni { display: flex; gap: 20px; margin-bottom: 10px; }
        .sezione-titolo { background: var(--primary); color: white; padding: 10px; border-radius: 8px; margin: 25px 0 15px; text-align: center; font-weight: bold; }

        /* Contenitore Firma (Stile del tuo esempio) */
        .signature-container { border: 2px dashed #ccc; background: #fff; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        #signature-pad { width: 100%; height: 200px; display: block; cursor: crosshair; }

        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-clear { margin-top:5px; background:none; border:1px solid red; color:red; padding:8px 15px; border-radius:4px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .btn-foto { background: #e9ecef; border: 1px solid #ced4da; border-radius: 8px; padding: 10px 15px; font-size: 1.2rem; cursor: pointer; }
        .area-note { width: 100%; height: 60px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <button id="btnHomeFisso" class="btn-home-fixed" onclick="window.tornaAllaHome()">🏠 HOME</button>

    <div class="header-logo">
        <img src="pt.png" alt="Logo PT" onerror="this.src='https://via.placeholder.com/150x50?text=Logo+PT'">
    </div>

    <!-- Schermata Home -->
    <div id="home-screen" class="container" style="text-align: center;">
        <h2 style="color: var(--primary); margin-top: 40px;">Controllo Periodico Antincendio</h2>
        <p>Seleziona un'operazione per iniziare</p>
        
        <button onclick="window.mostraApp()" class="btn-main" style="margin-top: 20px;">🆕 NUOVA VERIFICA</button>
        <button onclick="window.caricaStorico()" class="btn-main" style="background: var(--secondary); margin-top: 15px;">📂 ARCHIVIO</button>
    </div>

    <!-- App Interface -->
    <div id="app-interface" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn active" id="btn-tab-info" onclick="window.openTab(event, 'tab-info')">📋 INFO</button>
            <button class="tab-btn" id="btn-tab-check" onclick="window.openTab(event, 'tab-check')">✅ CHECKLIST</button>
            <button class="tab-btn" id="btn-tab-invio" onclick="window.openTab(event, 'tab-invio')">✍️ FIRMA</button>
        </nav>

        <div id="tab-info" class="tab-content container">
            <div class="input-group">
                <label>OPERATORE 1</label>
                <select id="operatore_1">
                    <option value="">Seleziona...</option>
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Giuseppe Marcone">Giuseppe Marcone</option>
                </select>
            </div>
            <div class="input-group">
                <label>DATA INTERVENTO</label>
                <input type="date" id="dataVerifica">
            </div>
        </div>

        <div id="tab-check" class="tab-content container" style="display:none;">
            <div id="checklist-container"></div>
        </div>

        <div id="tab-invio" class="tab-content container" style="display:none;">
            <h3 style="color: var(--primary);">Firma Operatore</h3>
            <div class="signature-container">
                <canvas id="signature-pad"></canvas>
            </div>
            <button class="btn-clear" onclick="window.cancellaFirma()">CANCELLA FIRMA</button>
            
            <button id="btnInvia" class="btn-main" style="background: #28a745; margin-top: 40px;" onclick="window.inviaVerifica()">🚀 INVIA E SALVA PDF</button>
        </div>
    </div>

    <!-- Archivio -->
    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Ultime Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="window.tornaAllaHome()" class="btn-clear" style="border-color: #ccc; color: #666; margin-top: 20px;">CHIUDI ARCHIVIO</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
