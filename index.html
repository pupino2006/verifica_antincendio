<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifica Antincendio PT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #004a99; 
            --secondary: #8b98a7; 
            --bg: #f0f2f5; 
            --white: #ffffff; 
            --success: #28a745;
            --danger: #dc3545;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #333; 
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .header-logo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            background: var(--white); 
            border-bottom: 1px solid #ddd; 
        }
        .header-logo img { height: 50px; }

        .btn-home-fixed { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 1001; 
            background: var(--primary); 
            color: white; 
            border: 2px solid white; 
            padding: 8px 15px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .tabs { 
            display: flex; 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px 5px; 
            border: none; 
            background: none; 
            color: rgba(255,255,255,0.7); 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-bottom: 3px solid transparent; 
            font-size: 0.8rem;
        }
        .tab-btn.active { 
            color: white; 
            border-bottom-color: white; 
            background: rgba(255,255,255,0.1); 
        }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        .card-verifica { 
            background: var(--white); 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border-left: 6px solid var(--primary); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }
        .domanda-testo { font-weight: 600; display: block; margin-bottom: 12px; line-height: 1.4; color: #444; }
        .opzioni { display: flex; gap: 30px; margin-bottom: 15px; }
        .opzioni label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }
        
        .sezione-titolo { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 30px 0 15px; 
            text-align: center; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .signature-container { 
            border: 2px dashed #ccc; 
            background: #fff; 
            margin-top: 10px; 
            border-radius: 8px; 
            touch-action: none;
        }
        .signature-pad-canvas { 
            width: 100%; 
            height: 180px; 
            display: block; 
        }

        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        .btn-clear { 
            margin-top: 8px; 
            background: none; 
            border: 1px solid var(--danger); 
            color: var(--danger); 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold;
        }
        
        .btn-foto { 
            background: #f8f9fa; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 12px; 
            width: 100%;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            color: #555;
            font-weight: bold;
        }
        .area-note { 
            width: 100%; 
            height: 70px; 
            margin-top: 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            padding: 10px; 
            box-sizing: border-box; 
            resize: none;
        }

        .photo-preview { display: none; margin-top: 10px; border: 2px solid var(--success); border-radius: 8px; overflow: hidden; }
        .photo-preview img { width: 100%; display: block; }

        #loading-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 2rem; margin-bottom: 20px;">⏳</div>
        <div id="loading-text">Generazione Report e Invio Mail...</div>
    </div>

    <button id="btnHomeFisso" class="btn-home-fixed" onclick="location.reload()">🏠 HOME</button>

    <div class="header-logo">
        <img src="pt.png" alt="Logo">
    </div>

    <div id="home-screen" class="container" style="text-align: center; padding-top: 50px;">
        <h2 style="color: var(--primary);">Controllo Periodico Antincendio</h2>
        <p style="color: var(--secondary);">Pannelli Termici S.r.l.</p>
        
        <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px;">
            <button onclick="mostraApp()" class="btn-main">🆕 NUOVA VERIFICA</button>
            <button onclick="caricaStorico()" class="btn-main" style="background: var(--secondary);">📂 ARCHIVIO</button>
        </div>
    </div>

    <div id="app-interface" style="display:none;">
        <nav class="tabs">
            <button class="tab-btn active" id="btn-tab-info" onclick="openTab(event, 'tab-info')">📋 INFO</button>
            <button class="tab-btn" id="btn-tab-check" onclick="openTab(event, 'tab-check')">✅ CHECKLIST</button>
            <button class="tab-btn" id="btn-tab-invio" onclick="openTab(event, 'tab-invio')">✍️ FIRMA</button>
        </nav>

        <div id="tab-info" class="tab-content container">
            <div class="input-group">
                <label>OPERATORE</label>
                <select id="operatore_1">
                    <option value="Francesco Marcone">Francesco Marcone</option>
                    <option value="Giuliano Di Carlo">Giuliano Di Carlo</option>
                    <option value="Sabatino Lalli">Sabatino Lalli</option>
                    <option value="Ripà Luca">Ripà Luca</option>
                </select>
            </div>
            <div class="input-group">
                <label>DATA INTERVENTO</label>
                <input type="date" id="dataVerifica">
            </div>
            <button class="btn-main" onclick="openTab(null, 'tab-check')" style="margin-top: 20px;">AVANTI ➔</button>
        </div>

        <div id="tab-check" class="tab-content container" style="display:none;">
            <div id="checklist-container"></div>
            <button class="btn-main" onclick="openTab(null, 'tab-invio')" style="margin-top: 20px; background: var(--secondary);">VAI ALLA FIRMA ➔</button>
        </div>

        <div id="tab-invio" class="tab-content container" style="display:none;">
            <h3 style="color: var(--primary); margin-bottom: 5px;">Firma del Tecnico</h3>
            <div class="signature-container">
                <canvas id="signature-pad" class="signature-pad-canvas"></canvas>
            </div>
            <button class="btn-clear" onclick="sigPad.clear()">CANCELLA FIRMA</button>
            
            <button id="btnInvia" class="btn-main" style="background: var(--success); margin-top: 50px;" onclick="inviaVerifica()">🚀 SALVA E GENERA PDF</button>
        </div>
    </div>

    <div id="tab-storico" class="container" style="display:none;">
        <h3 style="color: var(--primary); text-align: center;">Archivio Verifiche</h3>
        <div id="lista-verifiche"></div>
        <button onclick="location.reload()" class="btn-main" style="background: var(--secondary); margin-top: 20px;">TORNA ALLA HOME</button>
    </div>

    <script>
        const SB_URL = "https://vnzrewcbnoqbqvzckome.supabase.co";
        const SB_KEY = "sb_publishable_Sq9txbu-PmKdbxETSx2cjw_WqWEFBPO"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let sigPad = null;
        let fotoData = {};

        const SEZIONI = {
            "Estintori": ["Segnalati?", "Accessibili?", "Assenza anomalie?", "Controllo semestrale OK?"],
            "Idranti": ["Segnalati?", "Accessibili?", "Assenza anomalie?"],
            "Luci Emergenza": ["Funzionanti?", "Integrità visiva?"],
            "Porte Tagliafuoco": ["Apertura libera?", "Chiudiporta funzionante?"]
        };

        function mostraApp() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            document.getElementById('dataVerifica').valueAsDate = new Date();
            renderChecklist();
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).style.display = "block";
            if (evt) evt.currentTarget.classList.add("active");
            if (tabName === 'tab-invio' && !sigPad) {
                setTimeout(() => {
                    const canvas = document.getElementById('signature-pad');
                    sigPad = new SignaturePad(canvas);
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                }, 200);
            }
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            let html = '';
            for (const [sez, domande] of Object.entries(SEZIONI)) {
                html += `<div class="sezione-titolo">${sez}</div>`;
                domande.forEach((d, i) => {
                    const id = `${sez}_${i}`.replace(/\s+/g, '_');
                    html += `
                        <div class="card-verifica">
                            <p class="domanda-testo">${d}</p>
                            <div class="opzioni">
                                <label><input type="radio" name="${id}" value="SI" checked> SI</label>
                                <label><input type="radio" name="${id}" value="NO"> NO</label>
                            </div>
                            <textarea id="note_${id}" class="area-note" placeholder="Eventuali note..."></textarea>
                            <button class="btn-foto" onclick="document.getElementById('file_${id}').click()">📸 FOTO</button>
                            <input type="file" id="file_${id}" hidden accept="image/*" capture="environment" onchange="gestisciFoto(event, '${id}')">
                            <div id="preview_${id}" class="photo-preview"><img id="img_${id}"></div>
                        </div>`;
                });
            }
            container.innerHTML = html;
        }

        function gestisciFoto(e, id) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    fotoData[id] = ev.target.result;
                    document.getElementById(`img_${id}`).src = ev.target.result;
                    document.getElementById(`preview_${id}`).style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }

        async function inviaVerifica() {
            const btn = document.getElementById('btnInvia');
            const overlay = document.getElementById('loading-overlay');
            
            if (sigPad.isEmpty()) return alert("Manca la firma!");
            
            btn.disabled = true;
            overlay.style.display = 'flex';

            const payload = {
                operatore_1: document.getElementById('operatore_1').value,
                data_ispezione: document.getElementById('dataVerifica').value,
                risposte: {},
                foto: fotoData,
                firma_base64: sigPad.toDataURL()
            };

            for (const [sez, domande] of Object.entries(SEZIONI)) {
                payload.risposte[sez] = domande.map((d, i) => {
                    const id = `${sez}_${i}`.replace(/\s+/g, '_');
                    return {
                        q: d,
                        r: document.querySelector(`input[name="${id}"]:checked`).value,
                        n: document.getElementById(`note_${id}`).value
                    };
                });
            }

            try {
                const { data, error } = await supabaseClient.from('verifiche_antincendio').insert([payload]).select();
                if (error) throw error;

                // Chiama la Edge Function
                await supabaseClient.functions.invoke('antincendio-v2', { body: { record: data[0] } });

                alert("✅ Inviato con successo!");
                location.reload();
            } catch (err) {
                alert("Errore: " + err.message);
                btn.disabled = false;
                overlay.style.display = 'none';
            }
        }

        async function caricaStorico() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('tab-storico').style.display = 'block';
            document.getElementById('btnHomeFisso').style.display = 'block';
            
            const { data, error } = await supabaseClient.from('verifiche_antincendio').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('lista-verifiche');
            
            if (error) list.innerHTML = "Errore caricamento.";
            else {
                list.innerHTML = data.map(v => `
                    <div class="card-verifica">
                        <strong>${v.operatore_1}</strong> - ${new Date(v.data_ispezione).toLocaleDateString()}<br>
                        <a href="${v.pdf_url}" target="_blank" style="color:var(--primary);">📄 Vedi PDF</a>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
